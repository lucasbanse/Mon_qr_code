<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Adaptatif avec Logo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f1f5f9;
        }
        .loader {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .canvas-container {
            position: relative;
            display: inline-block;
        }
    </style>
</head>
<body class="text-slate-900 antialiased min-h-screen">

    <!-- ECRAN DE REDIRECTION (Caché par défaut) -->
    <div id="redirect-screen" class="hidden flex-col items-center justify-center min-h-screen p-6 bg-white">
        <div class="loader mb-4"></div>
        <h1 class="text-xl font-semibold">Redirection intelligente...</h1>
        <p class="text-slate-500 text-sm mt-2 text-center">Nous vous dirigeons vers la version adaptée à votre appareil.</p>
    </div>

    <!-- ECRAN DE L'APPLICATION -->
    <div id="app-screen" class="hidden max-w-4xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 mb-4">QR Code Adaptatif Pro</h1>
            <p class="text-lg text-slate-600">Un seul QR code pour iOS et Android, personnalisé à votre image.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Configuration -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i data-lucide="link" class="w-5 h-5 text-blue-500"></i> Liens de destination
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Lien iOS (App Store / Défaut)</label>
                            <input type="url" id="iosInput" class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="https://apps.apple.com/...">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Lien Android (Google Play)</label>
                            <input type="url" id="androidInput" class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="https://play.google.com/...">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1 italic text-slate-500">URL de ce site sur GitHub</label>
                            <input type="url" id="baseUrlInput" class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-xl text-sm" placeholder="https://votre-nom.github.io/repo/">
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i data-lucide="palette" class="w-5 h-5 text-purple-500"></i> Personnalisation
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Logo de l'application</label>
                            <label class="flex items-center justify-center w-full h-32 px-4 transition bg-white border-2 border-gray-300 border-dashed rounded-xl appearance-none cursor-pointer hover:border-blue-400 focus:outline-none" id="drop-area">
                                <span class="flex items-center space-x-2">
                                    <i data-lucide="image-plus" class="w-6 h-6 text-gray-600"></i>
                                    <span class="font-medium text-gray-600" id="file-name">Choisir un logo (PNG/JPG)</span>
                                </span>
                                <input type="file" id="logoInput" name="logo" class="hidden" accept="image/*">
                            </label>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-slate-700 mb-1">Couleur du QR</label>
                                <input type="color" id="colorInput" value="#000000" class="h-10 w-full rounded-lg cursor-pointer">
                            </div>
                        </div>
                    </div>
                </div>

                <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                    Générer mon QR Code
                </button>
            </div>

            <!-- Visualisation -->
            <div class="flex flex-col">
                <div id="result-card" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center justify-center text-center sticky top-8 min-h-[500px]">
                    <div id="empty-state">
                        <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="qr-code" class="w-10 h-10 text-slate-400"></i>
                        </div>
                        <p class="text-slate-500">Configurez vos liens pour voir l'aperçu</p>
                    </div>

                    <div id="qr-container" class="hidden w-full flex flex-col items-center">
                        <div class="bg-white p-4 rounded-3xl shadow-xl border border-slate-100 mb-8 inline-block">
                            <canvas id="qrcode-canvas"></canvas>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 w-full">
                            <button id="downloadBtn" class="bg-slate-900 text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2 hover:bg-slate-800 transition-all">
                                <i data-lucide="download" class="w-5 h-5"></i> PNG
                            </button>
                            <button id="shareBtn" class="bg-blue-100 text-blue-700 py-3 rounded-xl font-semibold flex items-center justify-center gap-2 hover:bg-blue-200 transition-all">
                                <i data-lucide="share-2" class="w-5 h-5"></i> Partager
                            </button>
                        </div>

                        <div class="mt-8 w-full">
                            <p class="text-xs text-slate-400 uppercase font-bold text-left mb-2 tracking-widest">Lien encodé</p>
                            <div class="flex gap-2">
                                <input type="text" id="finalUrl" readonly class="bg-slate-50 border border-slate-200 text-xs py-2 px-3 rounded-lg flex-1 outline-none">
                                <button id="copyBtn" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200">
                                    <i data-lucide="copy" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 opacity-0 translate-y-10 transition-all duration-300 pointer-events-none">
        <i data-lucide="check" class="text-green-400 w-5 h-5"></i>
        <span id="toast-text">Lien copié !</span>
    </div>

    <script>
        lucide.createIcons();

        // 1. GESTION DE LA REDIRECTION (IDENTIQUE)
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const ios = params.get('ios');
            const and = params.get('and');

            if (ios) {
                document.getElementById('redirect-screen').classList.replace('hidden', 'flex');
                const ua = navigator.userAgent || navigator.vendor;
                let url = decodeURIComponent(ios);
                if (/android/i.test(ua) && and) url = decodeURIComponent(and);
                setTimeout(() => window.location.href = url, 1000);
            } else {
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('baseUrlInput').value = window.location.href.split('?')[0];
            }
        });

        const logoInput = document.getElementById('logoInput');
        const fileNameLabel = document.getElementById('file-name');
        let logoImage = null;

        // Prévisualisation du logo
        logoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameLabel.textContent = file.name;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => { logoImage = img; };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // 2. GÉNÉRATION AVANCÉE (QR + LOGO)
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const ios = document.getElementById('iosInput').value.trim();
            const and = document.getElementById('androidInput').value.trim();
            const base = document.getElementById('baseUrlInput').value.trim();
            const color = document.getElementById('colorInput').value;

            if (!ios) return alert("Veuillez entrer au moins le lien iOS.");

            const finalLink = `${base}?ios=${encodeURIComponent(ios)}${and ? '&and=' + encodeURIComponent(and) : ''}`;
            document.getElementById('finalUrl').value = finalLink;

            const canvas = document.getElementById('qrcode-canvas');
            
            // On génère le QR code avec un niveau de correction 'H' (High) pour supporter le logo
            try {
                await QRCode.toCanvas(canvas, finalLink, {
                    width: 300,
                    margin: 1,
                    errorCorrectionLevel: 'H',
                    color: { dark: color, light: '#ffffff' }
                });

                // Si un logo est présent, on le dessine par dessus
                if (logoImage) {
                    const ctx = canvas.getContext('2d');
                    const size = canvas.width;
                    const logoSize = size * 0.22; // Le logo occupe 22% du QR code
                    const x = (size - logoSize) / 2;
                    const y = (size - logoSize) / 2;

                    // Dessiner un fond blanc arrondi sous le logo pour la lisibilité
                    ctx.fillStyle = "#ffffff";
                    const padding = 6;
                    ctx.beginPath();
                    ctx.roundRect(x - padding, y - padding, logoSize + (padding*2), logoSize + (padding*2), 8);
                    ctx.fill();

                    // Dessiner le logo
                    ctx.drawImage(logoImage, x, y, logoSize, logoSize);
                }

                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('qr-container').classList.remove('hidden');
            } catch (err) {
                console.error(err);
            }
        });

        // ACTIONS
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'qrcode-app-pro.png';
            link.href = document.getElementById('qrcode-canvas').toDataURL();
            link.click();
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(document.getElementById('finalUrl').value);
            showToast("Lien copié !");
        });

        document.getElementById('shareBtn').addEventListener('click', async () => {
            const url = document.getElementById('finalUrl').value;
            if (navigator.share) {
                navigator.share({ title: 'Mon QR Code', url: url });
            } else {
                navigator.clipboard.writeText(url);
                showToast("Lien copié (partage non supporté)");
            }
        });

        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = text;
            toast.classList.replace('opacity-0', 'opacity-100');
            toast.classList.replace('translate-y-10', 'translate-y-0');
            setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
                toast.classList.replace('translate-y-0', 'translate-y-10');
            }, 2500);
        }
    </script>
</body>
</html>
